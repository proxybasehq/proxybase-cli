name: proxybase-cli Release

on:
  push:
    tags:
      - "proxybase-cli-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release Asset (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: zip
            exe_suffix: ".exe"
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_ext: tar.gz
            exe_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Ensure Cargo.lock exists
        shell: bash
        run: |
          if [[ ! -f Cargo.lock ]]; then
            cargo generate-lockfile
          fi

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME="proxybase-cli"
          BIN_PATH="target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.exe_suffix }}"
          mkdir -p dist

          if [[ "${{ matrix.artifact_ext }}" == "zip" ]]; then
            7z a "dist/${BIN_NAME}-${{ matrix.target }}.zip" "$BIN_PATH"
          else
            tar -C "$(dirname "$BIN_PATH")" -czf "dist/${BIN_NAME}-${{ matrix.target }}.tar.gz" "$(basename "$BIN_PATH")"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
